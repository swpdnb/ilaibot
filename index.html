<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; padding: 15px; background: #f0f4f8; color: #333; }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ШАПКА */
    .page-header {
      background: #2481cc;
      color: #fff;
      padding: 14px 16px;
      margin: -15px -15px 16px -15px;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-wrap { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .menu-btn { padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
    .menu-btn.primary   { background: #2481cc; color: #fff; }
    .menu-btn.secondary { background: #e0e0e0; color: #333; }

    .type-buttons { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .btn { flex: 1; min-width: 90px; padding: 10px 6px; background: #e0e0e0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; color: #333; text-align: center; }
    .btn.active { background: #2481cc; color: #fff; }

    .form-box { display: none; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .form-box.active { display: block; }

    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
    input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input[type="file"] { margin-top: 4px; font-size: 13px; width: 100%; }

    .submit-btn { width: 100%; padding: 14px; background: #28a745; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    .back-btn { width: 100%; padding: 10px; background: #e0e0e0; color: #333; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-bottom: 14px; }

    /* КАРТОЧКА */
    .order-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .order-card-body { padding: 12px 14px 6px 14px; }
    .order-id   { font-size: 11px; color: #999; margin-bottom: 4px; }
    .order-name { font-size: 15px; font-weight: bold; margin-bottom: 6px; color: #222; }
    .order-meta { font-size: 12px; color: #555; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .order-meta span { display: flex; align-items: center; gap: 3px; }

    /* БЛОКИ СТАТУСОВ */
    .status-block { border-top: 1px solid #f0f0f0; }
    .status-block-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
      color: #fff;
      text-transform: uppercase;
    }
    .status-block-header.avans { background: #2481cc; }
    .status-block-header.zakr  { background: #28a745; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      font-size: 13px;
      border-bottom: 1px solid #f5f5f5;
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #777; }
    .status-value { text-align: right; }

    /* БЕЙДЖИ */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }
    .badge-green  { background: #d4edda; color: #155724; }
    .badge-yellow { background: #fff3cd; color: #856404; }
    .badge-blue   { background: #cce5ff; color: #004085; }
    .badge-red    { background: #f8d7da; color: #721c24; }
    .badge-gray   { background: #e2e3e5; color: #383d41; }
    .badge-plain  { font-size: 13px; color: #333; }

    /* КНОПКИ КАРТОЧКИ */
    .order-card-footer {
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid #f0f0f0;
    }
    .link-btn {
      padding: 7px 13px;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
      background: #2481cc;
    }
    .link-btn.orange { background: #f0ad4e; }
    .link-btn.green  { background: #28a745; }
    .link-btn.gray   { background: #6c757d; }

    .empty-msg   { text-align: center; color: #999; margin-top: 40px; font-size: 14px; }
    .loading-msg { text-align: center; color: #2481cc; margin-top: 40px; font-size: 14px; }

    .fix-banner { background: #fff3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; text-align: center; }

    #sub-block     { display: none; margin-bottom: 12px; }
    #doplata-block { display: none; margin-bottom: 12px; }

    .doplata-order-select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }

    .linked-order-info { display: none; background: #e8f4fd; border: 1px solid #2481cc; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; }
    .linked-order-info .linked-title { font-weight: bold; margin-bottom: 6px; color: #2481cc; }
    .linked-order-info a { display: inline-block; margin-top: 8px; padding: 6px 12px; background: #2481cc; color: #fff; border-radius: 5px; text-decoration: none; font-size: 12px; }

    .search-wrap { margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #ccc; font-size: 14px; outline: none; background: #fff;
    }
    .search-wrap input:focus { border-color: #2481cc; }

    .section-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #555; }
  </style>
</head>
<body>

<!-- ЭКРАН 1: МЕНЮ -->
<div id="screen-menu" class="screen active">
  <div class="page-header">📋 Управление заявками</div>
  <div class="menu-wrap">
    <button class="menu-btn primary"   id="btn-go-orders">📂 Мои заявки</button>
    <button class="menu-btn secondary" id="btn-go-new">➕ Новая заявка</button>
  </div>
</div>

<!-- ЭКРАН 2: МОИ ЗАЯВКИ -->
<div id="screen-orders" class="screen">
  <div class="page-header">📂 Мои заявки</div>
  <button class="back-btn" id="back-from-orders">← Назад</button>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или ID...">
  </div>
  <div id="orders-list"><div class="loading-msg">⏳ Загрузка...</div></div>
</div>

<!-- ЭКРАН 3: НОВАЯ ЗАЯВКА -->
<div id="screen-new" class="screen">
  <div class="page-header">➕ Новая заявка</div>
  <button class="back-btn" id="back-from-new">← Назад</button>

  <div class="section-title">Тип оплаты</div>
  <div class="type-buttons">
    <button type="button" class="btn" id="btn-status1">Предоплата<br>(Аванс)</button>
    <button type="button" class="btn" id="btn-status2">Доплата<br>(остаток)</button>
    <button type="button" class="btn" id="btn-status3">Оплата<br>(100%)</button>
  </div>

  <div id="doplata-block">
    <div class="section-title">📎 Связанная заявка (предоплата)</div>
    <select class="doplata-order-select" id="doplata-order-select">
      <option value="">⏳ Загрузка заявок...</option>
    </select>
    <div class="linked-order-info" id="linked-order-info">
      <div class="linked-title">📋 Информация о заявке</div>
      <div id="linked-order-details"></div>
      <a id="linked-order-link" href="#" target="_blank">📁 Открыть документы предоплаты</a>
    </div>
  </div>

  <div id="sub-block">
    <div class="section-title">Вариант исполнения</div>
    <div class="type-buttons">
      <button type="button" class="btn" id="btn-sub1">Иждивение</button>
      <button type="button" class="btn" id="btn-sub2">Давальческое</button>
    </div>
  </div>

  <form id="megaForm">
    <div id="form-fields" class="form-box">
      <div class="form-group" id="f-contractor">
        <label>Подрядчик *</label>
        <input type="text" id="contractor" placeholder="Наименование подрядчика" required>
      </div>
      <div class="form-group" id="f-branch">
        <label>Филиал *</label>
        <input type="text" id="branch" placeholder="Название филиала" required>
      </div>
      <div class="form-group" id="f-смета"   style="display:none;"><label>📄 Смета</label><input type="file" id="i-смета"></div>
      <div class="form-group" id="f-договор" style="display:none;"><label>📄 Договор</label><input type="file" id="i-договор"></div>
      <div class="form-group" id="f-счет"    style="display:none;"><label>📄 Счет на оплату</label><input type="file" id="i-счет"></div>
      <div class="form-group" id="f-дс"      style="display:none;"><label>📄 Доп. соглашение</label><input type="file" id="i-дс"></div>
      <div class="form-group" id="f-кс2"     style="display:none;"><label>📄 КС-2</label><input type="file" id="i-кс2"></div>
      <div class="form-group" id="f-кс3"     style="display:none;"><label>📄 КС-3</label><input type="file" id="i-кс3"></div>
      <div class="form-group" id="f-упд"     style="display:none;"><label>📄 УПД / АКТ</label><input type="file" id="i-упд"></div>
      <div class="form-group" id="f-отчет"   style="display:none;"><label>📄 Отчет давальческого</label><input type="file" id="i-отчет"></div>
      <div class="form-group" id="f-m15"     style="display:none;">
        <label>М-15</label>
        <select id="i-m15">
          <option value="">Не выбрано</option>
          <option value="Есть">Есть</option>
          <option value="Нет">Нет</option>
        </select>
      </div>
      <button type="submit" class="submit-btn" id="submit-new">📤 Отправить заявку</button>
    </div>
  </form>
</div>

<!-- ЭКРАН 4: ИСПРАВЛЕННЫЕ -->
<div id="screen-fix" class="screen">
  <div class="page-header">📎 Исправленные документы</div>
  <button class="back-btn" id="back-from-fix">← Назад к заявкам</button>
  <div class="fix-banner">Заявка № <strong id="fix-order-id-text"></strong></div>
  <form id="fixForm">
    <div class="form-box active">
      <div class="form-group" id="ff-смета"   style="display:none;"><label>📄 Смета</label><input type="file" id="fi-смета"></div>
      <div class="form-group" id="ff-договор" style="display:none;"><label>📄 Договор</label><input type="file" id="fi-договор"></div>
      <div class="form-group" id="ff-счет"    style="display:none;"><label>📄 Счет на оплату</label><input type="file" id="fi-счет"></div>
      <div class="form-group" id="ff-дс"      style="display:none;"><label>📄 Доп. соглашение</label><input type="file" id="fi-дс"></div>
      <div class="form-group" id="ff-кс2"     style="display:none;"><label>📄 КС-2</label><input type="file" id="fi-кс2"></div>
      <div class="form-group" id="ff-кс3"     style="display:none;"><label>📄 КС-3</label><input type="file" id="fi-кс3"></div>
      <div class="form-group" id="ff-упд"     style="display:none;"><label>📄 УПД / АКТ</label><input type="file" id="fi-упд"></div>
      <div class="form-group" id="ff-отчет"   style="display:none;"><label>📄 Отчет давальческого</label><input type="file" id="fi-отчет"></div>
      <button type="submit" class="submit-btn">📤 Загрузить исправленные</button>
    </div>
  </form>
</div>

<script>
// ===== TELEGRAM =====
let tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.expand();
  }
} catch(e) {}

let tgId = 'TEST_USER';
let tgUsername = '';
try {
  if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
    tgId       = tg.initDataUnsafe.user.id.toString();
    tgUsername = tg.initDataUnsafe.user.username || '';
  }
} catch(e) {}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyu12Esfnkq_CKmUtCp8jOD9VwZaNwpzCpvH3ZqJzqsyr914YdIOlgBpwZywd_gYLliQ/exec';

let currentMain       = '';
let currentSub        = '';
let currentFixOrderId = '';
let cachedOrders      = [];

// ===== ЭКРАНЫ =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== НАВИГАЦИЯ =====
document.getElementById('btn-go-orders').addEventListener('click', function() {
  showScreen('screen-orders');
  loadOrders();
});
document.getElementById('btn-go-new').addEventListener('click', function() {
  showScreen('screen-new');
});
document.getElementById('back-from-orders').addEventListener('click', function() {
  showScreen('screen-menu');
});
document.getElementById('back-from-new').addEventListener('click', function() {
  showScreen('screen-menu');
});
document.getElementById('back-from-fix').addEventListener('click', function() {
  showScreen('screen-orders');
  loadOrders();
});

// ===== ТИП ОПЛАТЫ =====
document.getElementById('btn-status1').addEventListener('click', function() { selectMain('status1'); });
document.getElementById('btn-status2').addEventListener('click', function() { selectMain('status2'); });
document.getElementById('btn-status3').addEventListener('click', function() { selectMain('status3'); });

function selectMain(type) {
  currentMain = type;
  currentSub  = '';

  document.querySelectorAll('#sub-block .btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.type-buttons .btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn-' + type).classList.add('active');

  hideAllFields();
  document.getElementById('form-fields').classList.remove('active');
  document.getElementById('sub-block').style.display         = 'none';
  document.getElementById('doplata-block').style.display     = 'none';
  document.getElementById('linked-order-info').style.display = 'none';

  if (type === 'status1') {
    showFields(['f-смета', 'f-договор', 'f-счет']);
    document.getElementById('form-fields').classList.add('active');
  } else if (type === 'status2') {
    document.getElementById('doplata-block').style.display = 'block';
    document.getElementById('sub-block').style.display     = 'block';
    loadDoplataOrders();
  } else if (type === 'status3') {
    document.getElementById('sub-block').style.display = 'block';
    document.getElementById('form-fields').classList.add('active');
  }
}

// ===== ЗАГРУЗКА ЗАЯВОК ДЛЯ ДОПЛАТЫ =====
async function loadDoplataOrders() {
  var select = document.getElementById('doplata-order-select');
  select.innerHTML = '<option value="">⏳ Загрузка...</option>';
  try {
    var payload = { mode: 'getOrders', tg_id: tgId, tg_username: tgUsername };
    var resp    = await fetch(SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload)));
    var result  = await resp.json();
    cachedOrders = result.orders || [];

    // Фильтруем только предоплаты (не закрытые)
    var predoplaty = cachedOrders.filter(function(o) {
      return (o.paymentType === 'предоплата' || o.paymentType === 'status1');
    });

    select.innerHTML = '<option value="__none__">— Не связанная заявка —</option>';

    predoplaty.forEach(function(order) {
      var opt = document.createElement('option');
      opt.value = order.id;
      opt.textContent = '№' + order.id + ' | ' + (order.contractor || '—') + ' | ' + (order.branch || '—') + ' | ' + (order.date || '');
      select.appendChild(opt);
    });

  } catch(err) {
    select.innerHTML = '<option value="__none__">— Не связанная заявка —</option>';
  }
}

// ===== ВЫБОР СВЯЗАННОЙ ЗАЯВКИ =====
document.getElementById('doplata-order-select').addEventListener('change', function() {
  var selectedId = this.value;
  var infoBlock  = document.getElementById('linked-order-info');
  var details    = document.getElementById('linked-order-details');
  var link       = document.getElementById('linked-order-link');

  if (!selectedId || selectedId === '__none__') {
    infoBlock.style.display = 'none';
    document.getElementById('contractor').value = '';
    document.getElementById('branch').value     = '';
    document.getElementById('form-fields').classList.add('active');
    return;
  }

  var order = cachedOrders.find(function(o) { return o.id === selectedId; });
  if (!order) { infoBlock.style.display = 'none'; return; }

  details.innerHTML =
    '<b>ID:</b> ' + order.id + '<br>' +
    '<b>Подрядчик:</b> ' + (order.contractor || '—') + '<br>' +
    '<b>Филиал:</b> '    + (order.branch     || '—') + '<br>' +
    '<b>Дата:</b> '      + (order.date        || '—');

  if (order.folderUrl) {
    link.href = order.folderUrl;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }

  infoBlock.style.display = 'block';
  document.getElementById('contractor').value = order.contractor || '';
  document.getElementById('branch').value     = order.branch     || '';
  document.getElementById('form-fields').classList.add('active');
});

// ===== ПОДТИП =====
document.getElementById('btn-sub1').addEventListener('click', function() { selectSub('иждивение'); });
document.getElementById('btn-sub2').addEventListener('click', function() { selectSub('давальческое'); });

function selectSub(sub) {
  currentSub = sub;
  document.querySelectorAll('#sub-block .btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(sub === 'иждивение' ? 'btn-sub1' : 'btn-sub2').classList.add('active');
  hideAllFields();
  if (sub === 'иждивение') {
    showFields(['f-смета', 'f-дс', 'f-кс2', 'f-кс3', 'f-упд', 'f-счет']);
  } else {
    showFields(['f-смета', 'f-дс', 'f-кс2', 'f-кс3', 'f-упд', 'f-отчет', 'f-m15', 'f-счет']);
  }
  document.getElementById('form-fields').classList.add('active');
}

function hideAllFields() {
  ['f-смета','f-договор','f-счет','f-дс','f-кс2','f-кс3','f-упд','f-отчет','f-m15'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

function showFields(ids) {
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'block';
  });
}

// ===== ФАЙЛ → BASE64 =====
function readFile(inputId) {
  return new Promise(function(resolve) {
    var input = document.getElementById(inputId);
    if (!input || !input.files || !input.files[0]) return resolve({ data: null, name: '' });
    var reader = new FileReader();
    reader.onload  = function(e) { resolve({ data: e.target.result, name: input.files[0].name }); };
    reader.onerror = function()  { resolve({ data: null, name: '' }); };
    reader.readAsDataURL(input.files[0]);
  });
}

// ===== БЕЙДЖ СТАТУСА =====
function getStatusBadge(value) {
  if (!value) return '<span class="badge-plain">—</span>';
  var v = value.toString().toLowerCase().trim();
  if (v === 'оплачено')               return '<span class="badge badge-green">'  + value + '</span>';
  if (v === 'в очереди на оплату')    return '<span class="badge badge-blue">'   + value + '</span>';
  if (v === 'на согласовании')        return '<span class="badge badge-yellow">' + value + '</span>';
  if (v === 'ждем счет')              return '<span class="badge badge-gray">'   + value + '</span>';
  if (v === 'отказ')                  return '<span class="badge badge-red">'    + value + '</span>';
  if (v === 'да' || v === 'есть' || v === 'подписан' || v === 'готово')
                                      return '<span class="badge badge-green">'  + value + '</span>';
  if (v === 'нет' || v === 'отсутствует')
                                      return '<span class="badge badge-red">'    + value + '</span>';
  if (v === 'в работе' || v === 'в процессе')
                                      return '<span class="badge badge-blue">'   + value + '</span>';
  return '<span class="badge-plain">' + value + '</span>';
}

// ===== СТРОКА СТАТУСА =====
function makeRow(label, value) {
  return '<div class="status-row">' +
    '<span class="status-label">' + (label || '') + '</span>' +
    '<span class="status-value">' + getStatusBadge(value) + '</span>' +
  '</div>';
}

// ===== ОТПРАВКА НОВОЙ ЗАЯВКИ =====
document.getElementById('megaForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  if (!currentMain) { alert('Выберите тип оплаты!'); return; }
  if ((currentMain === 'status2' || currentMain === 'status3') && !currentSub) {
    alert('Выберите вариант исполнения!'); return;
  }

  var linkedOrderId   = '';
  var linkedFolderUrl = '';

  if (currentMain === 'status2') {
    var selectVal = document.getElementById('doplata-order-select').value;
    if (!selectVal) { alert('Выберите заявку или "Не связанная заявка"!'); return; }

    if (selectVal !== '__none__') {
      linkedOrderId = selectVal;
      var linkedOrder = cachedOrders.find(function(o) { return o.id === linkedOrderId; });
      if (linkedOrder) linkedFolderUrl = linkedOrder.folderUrl || '';
    }
  }

  var btn = document.getElementById('submit-new');
  btn.disabled    = true;
  btn.textContent = '⏳ Отправка...';

  try {
    var смета   = await readFile('i-смета');
    var договор = await readFile('i-договор');
    var счет    = await readFile('i-счет');
    var дс      = await readFile('i-дс');
    var кс2     = await readFile('i-кс2');
    var кс3     = await readFile('i-кс3');
    var упд     = await readFile('i-упд');
    var отчет   = await readFile('i-отчет');
    var m15     = document.getElementById('i-m15') ? document.getElementById('i-m15').value : '';

    var payload = {
      mode: 'new',
      tg_id: tgId,
      tg_username: tgUsername,
      paymentType: currentMain,
      subType: currentSub,
      contractor: document.getElementById('contractor').value.trim(),
      branch:     document.getElementById('branch').value.trim(),
      m15: m15,
      linkedOrderId: linkedOrderId,
      linkedFolderUrl: linkedFolderUrl,
      сметаData:   смета.data,   сметаName:   смета.name,
      договорData: договор.data, договорName: договор.name,
      счетData:    счет.data,    счетName:    счет.name,
      дсData:      дс.data,      дсName:      дс.name,
      кс2Data:     кс2.data,     кс2Name:     кс2.name,
      кс3Data:     кс3.data,     кс3Name:     кс3.name,
      упдData:     упд.data,     упдName:     упд.name,
      отчетData:   отчет.data,   отчетName:   отчет.name
    };

    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

    alert('✅ Заявка отправлена!\n\nПроверьте Telegram — придёт подтверждение с номером заявки.');
    this.reset();
    hideAllFields();
    document.getElementById('form-fields').classList.remove('active');
    document.getElementById('sub-block').style.display         = 'none';
    document.getElementById('doplata-block').style.display     = 'none';
    document.getElementById('linked-order-info').style.display = 'none';
    document.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('active'); });
    currentMain = ''; currentSub = '';
    showScreen('screen-menu');

  } catch(err) {
    alert('❌ Ошибка отправки: ' + err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = '📤 Отправить заявку';
  }
});

// ===== ЗАГРУЗКА ЗАЯВОК =====
async function loadOrders() {
  var list = document.getElementById('orders-list');
  list.innerHTML = '<div class="loading-msg">⏳ Загрузка заявок...</div>';
  document.getElementById('searchInput').value = '';
  var url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({ mode: 'getOrders', tg_id: tgId, tg_username: tgUsername }));
  try {
    var resp = await fetch(url);
    var text = await resp.text();
    var result;
    try {
      result = JSON.parse(text);
    } catch(parseErr) {
      list.innerHTML = '<div class="empty-msg">❌ Ответ сервера:<br><small style="word-break:break-all;">' + text.substring(0, 300) + '</small></div>';
      return;
    }
    cachedOrders = result.orders || [];
    if (!cachedOrders || cachedOrders.length === 0) {
      list.innerHTML = '<div class="empty-msg">📭 Заявок пока нет<br><small>curator: ' + (result.curator || 'пусто') + '</small></div>';
      return;
    }
    renderOrders(cachedOrders);
  } catch(err) {
    list.innerHTML = '<div class="empty-msg">❌ Ошибка: ' + err.message + '<br><small>URL: ' + url.substring(0, 100) + '...</small></div>';
  }
}

// ===== РЕНДЕР КАРТОЧЕК =====
function renderOrders(orders) {
  var list = document.getElementById('orders-list');

  if (!orders || orders.length === 0) {
    list.innerHTML = '<div class="empty-msg">📭 Ничего не найдено</div>';
    return;
  }

  list.innerHTML = '';
  orders.slice().reverse().forEach(function(order) {
    var card = document.createElement('div');
    card.className = 'order-card';

    // Тип оплаты
    var paymentLabel = order.paymentType || '—';
    if (order.paymentType === 'status1' || order.paymentType === 'предоплата') paymentLabel = 'Предоплата (Аванс)';
    if (order.paymentType === 'status2' || order.paymentType === 'доплата')    paymentLabel = 'Доплата (остаток)';
    if (order.paymentType === 'status3' || order.paymentType === 'оплата100')  paymentLabel = 'Оплата (100%)';

    // Бейдж связанной заявки
    var linkedBadge = '';
    if (order.linkedOrderId) {
      linkedBadge = ' <span style="background:#fff3cd;color:#856404;padding:2px 7px;' +
        'border-radius:4px;font-size:11px;font-weight:bold;">🔗 Доплата к №' + order.linkedOrderId + '</span>';
    }

    // ── БЛОК АВАНС ──
    var avansRows = '';
    if (order.avans && order.avans.length > 0) {
      order.avans.forEach(function(item) {
        avansRows += makeRow(item.label, item.value);
      });
    }
    var avansBlock = '';
    if (avansRows) {
      avansBlock =
        '<div class="status-block">' +
          '<div class="status-block-header avans">💰 Аванс</div>' +
          avansRows +
        '</div>';
    }

    // ── БЛОК ЗАКРЫТИЕ ЗАТРАТ ──
    var zakrRows = '';
    if (order.zakr && order.zakr.length > 0) {
      order.zakr.forEach(function(item) {
        zakrRows += makeRow(item.label, item.value);
      });
    }
    var zakrBlock = '';
    if (zakrRows) {
      zakrBlock =
        '<div class="status-block">' +
          '<div class="status-block-header zakr">📋 Закрытие затрат</div>' +
          zakrRows +
        '</div>';
    }

    // Шапка карточки
    var cardBody =
      '<div class="order-card-body">' +
        '<div class="order-id">ID: ' + order.id + ' | ' + (order.date || '') + (linkedBadge ? ' ' + linkedBadge : '') + '</div>' +
        '<div class="order-name">' + (order.contractor || '—') + '</div>' +
        '<div class="order-meta">' +
          '<span>🏗 ' + (order.branch || '—') + '</span>' +
          '<span>💰 ' + paymentLabel + (order.subType ? ' · ' + order.subType : '') + '</span>' +
          (order.m15 ? '<span>📦 М-15: ' + order.m15 + '</span>' : '') +
        '</div>' +
      '</div>';

    // Кнопки
    var footer =
      '<div class="order-card-footer">' +
        (order.folderUrl
          ? '<a class="link-btn" href="' + order.folderUrl + '" target="_blank">📁 Документы</a>'
          : '') +
        (order.linkedFolderUrl
          ? '<a class="link-btn gray" href="' + order.linkedFolderUrl + '" target="_blank">📂 Предоплата</a>'
          : '') +
        (order.fixFolderUrl
          ? '<a class="link-btn green" href="' + order.fixFolderUrl + '" target="_blank">✅ Исправленные</a>'
          : '') +
        '<button class="link-btn orange"' +
          ' data-id="'      + order.id                  + '"' +
          ' data-payment="' + (order.paymentType || '') + '"' +
          ' data-m15="'     + (order.m15 || '')         + '">' +
          (order.fixFolderUrl ? '🔄 Загрузить снова' : '⚠️ Исправленные') +
        '</button>' +
      '</div>';

    card.innerHTML = cardBody + avansBlock + zakrBlock + footer;
    list.appendChild(card);
  });

  // Обработчики кнопок исправленных
  list.querySelectorAll('button[data-id]').forEach(function(b) {
    b.addEventListener('click', function() {
      openFixScreen(
        this.getAttribute('data-id'),
        this.getAttribute('data-payment'),
        this.getAttribute('data-m15')
      );
    });
  });
}

// ===== ПОИСК =====
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if (!q) { renderOrders(cachedOrders); return; }
  var filtered = cachedOrders.filter(function(o) {
    return (
      (o.id         && o.id.toString().toLowerCase().includes(q)) ||
      (o.contractor && o.contractor.toLowerCase().includes(q))    ||
      (o.branch     && o.branch.toLowerCase().includes(q))        ||
      (o.date       && o.date.toLowerCase().includes(q))
    );
  });
  renderOrders(filtered);
});

// ===== ЭКРАН ИСПРАВЛЕННЫХ =====
function openFixScreen(orderId, paymentType, m15) {
  currentFixOrderId = orderId;
  document.getElementById('fix-order-id-text').textContent = orderId;

  ['ff-смета','ff-договор','ff-счет','ff-дс','ff-кс2','ff-кс3','ff-упд','ff-отчет'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  if (paymentType === 'предоплата' || paymentType === 'status1') {
    ['ff-смета','ff-договор','ff-счет'].forEach(function(id) {
      document.getElementById(id).style.display = 'block';
    });
  } else if (m15 === 'Есть') {
    ['ff-смета','ff-дс','ff-кс2','ff-кс3','ff-упд','ff-отчет','ff-счет'].forEach(function(id) {
      document.getElementById(id).style.display = 'block';
    });
  } else {
    ['ff-смета','ff-дс','ff-кс2','ff-кс3','ff-упд','ff-счет'].forEach(function(id) {
      document.getElementById(id).style.display = 'block';
    });
  }

  showScreen('screen-fix');
}

// ===== ОТПРАВКА ИСПРАВЛЕННЫХ =====
document.getElementById('fixForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  var btn = this.querySelector('.submit-btn');
  btn.disabled    = true;
  btn.textContent = '⏳ Загрузка...';

  try {
    var смета   = await readFile('fi-смета');
    var договор = await readFile('fi-договор');
    var счет    = await readFile('fi-счет');
    var дс      = await readFile('fi-дс');
    var кс2     = await readFile('fi-кс2');
    var кс3     = await readFile('fi-кс3');
    var упд     = await readFile('fi-упд');
    var отчет   = await readFile('fi-отчет');

    var payload = {
      mode: 'fix',
      tg_id: tgId,
      tg_username: tgUsername,
      orderId: currentFixOrderId,
      сметаData:   смета.data,   сметаName:   смета.name,
      договорData: договор.data, договорName: договор.name,
      счетData:    счет.data,    счетName:    счет.name,
      дсData:      дс.data,      дсName:      дс.name,
      кс2Data:     кс2.data,     кс2Name:     кс2.name,
      кс3Data:     кс3.data,     кс3Name:     кс3.name,
      упдData:     упд.data,     упдName:     упд.name,
      отчетData:   отчет.data,   отчетName:   отчет.name
    };

    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

    alert('✅ Исправленные документы загружены!\n\nПроверьте Telegram.');
    this.reset();
    showScreen('screen-orders');
    loadOrders();

  } catch(err) {
    alert('❌ Ошибка: ' + err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = '📤 Загрузить исправленные';
  }
});
</script>
